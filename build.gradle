plugins {
    id 'java'
}

group = 'com.metzprojects'
version = 'v1.1.1 - Language Update Fix'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}